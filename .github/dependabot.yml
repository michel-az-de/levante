version: 2
updates:
  # NuGet (Central Package Management na raiz governa src/api e tests).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"

  # npm (frontend Next.js).
  - package-ecosystem: npm
    directory: "/src/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"

  # GitHub Actions usadas no CI.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
