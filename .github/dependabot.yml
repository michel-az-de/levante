version: 2
updates:
  # NuGet (Central Package Management na raiz governa src/api e tests).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"

  # npm (frontend Next.js).
  - package-ecosystem: npm
    directory: "/src/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
    ignore:
      # eslint 10 quebra o eslint-plugin-react do eslint-config-next 16
      # (usa context.getFilename, removido na v10). Liberar quando houver
      # eslint-config-next compativel com eslint 10.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # @types/node acompanha o major do runtime (Node 22 no CI), nao o latest.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions usadas no CI.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
