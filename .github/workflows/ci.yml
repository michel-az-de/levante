name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  NODE_VERSION: "22"
  SLN: src/api/Levante.sln

jobs:
  # 1) rough-cut: compila com warnings as errors; restore valida CPM + NuGet audit.
  rough-cut:
    name: rough-cut (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore ${{ env.SLN }}
      - run: dotnet build ${{ env.SLN }} -c Release --no-restore

  # 2) dress: format, arch tests, gitleaks, contrato OpenAPI em sincronia, lint web.
  dress:
    name: dress (format, analyzers, arch, gitleaks, contrato)
    needs: rough-cut
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Formatacao (dotnet format)
        run: dotnet format ${{ env.SLN }} --verify-no-changes

      - name: Arch tests (Domain sem Infra)
        run: dotnet test tests/Levante.ArchitectureTests/Levante.ArchitectureTests.csproj -c Release

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Emite contrato OpenAPI fresco
        # Caminho absoluto: 'dotnet run --project' usa o dir do projeto como CWD.
        run: dotnet run --project src/api/host/Levante.Api -c Release --no-launch-profile -- --emit-openapi "$GITHUB_WORKSPACE/src/web/openapi/levante.json"

      - name: Contrato em sincronia com a API
        run: git diff --exit-code -- src/web/openapi/levante.json

      - name: Instala dependencias web
        working-directory: src/web
        run: npm ci

      - name: Regenera tipos do OpenAPI
        working-directory: src/web
        run: npm run gen:api

      - name: Tipos TS em sincronia com o contrato
        run: git diff --exit-code -- src/web/src/types/api.ts

      - name: Lint web
        working-directory: src/web
        run: npm run lint

  # 3) polish: testes (inclui privilegio minimo do Mongo via Testcontainers) +
  #    cobertura minima do Domain + build do front.
  polish:
    name: polish (testes + cobertura + build web)
    needs: dress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Testes de unidade (sem Docker)
        run: dotnet test ${{ env.SLN }} -c Release --filter "Category!=Integration"

      - name: Testes de integracao (Testcontainers)
        run: dotnet test ${{ env.SLN }} -c Release --filter "Category=Integration"

      # ThresholdStat=minimum: CADA assembly (Domain e Application) precisa
      # atingir 80% de linha, nao a media entre eles.
      - name: Gate de cobertura de Conteudo (Domain + Application >= 80% linha)
        run: >
          dotnet test tests/Levante.Conteudo.UnitTests/Levante.Conteudo.UnitTests.csproj
          -c Release
          -p:CollectCoverage=true
          -p:ThresholdType=line
          -p:ThresholdStat=minimum
          -p:Threshold=80
          -p:Include="[Levante.Conteudo.Domain]*%2c[Levante.Conteudo.Application]*"

      - name: Gate de cobertura de Identity (Domain + Application >= 80% linha)
        run: >
          dotnet test tests/Levante.Identity.UnitTests/Levante.Identity.UnitTests.csproj
          -c Release
          -p:CollectCoverage=true
          -p:ThresholdType=line
          -p:ThresholdStat=minimum
          -p:Threshold=80
          -p:Include="[Levante.Identity.Domain]*%2c[Levante.Identity.Application]*"

      - name: Gate de cobertura de Engajamento (Domain + Application >= 80% linha)
        run: >
          dotnet test tests/Levante.Engajamento.UnitTests/Levante.Engajamento.UnitTests.csproj
          -c Release
          -p:CollectCoverage=true
          -p:ThresholdType=line
          -p:ThresholdStat=minimum
          -p:Threshold=80
          -p:Include="[Levante.Engajamento.Domain]*%2c[Levante.Engajamento.Application]*"

      - name: Gate de cobertura de Audiencia (Domain + Application >= 80% linha)
        run: >
          dotnet test tests/Levante.Audiencia.UnitTests/Levante.Audiencia.UnitTests.csproj
          -c Release
          -p:CollectCoverage=true
          -p:ThresholdType=line
          -p:ThresholdStat=minimum
          -p:Threshold=80
          -p:Include="[Levante.Audiencia.Domain]*%2c[Levante.Audiencia.Application]*"

      - name: Instala dependencias web
        working-directory: src/web
        run: npm ci

      - name: Testes do front (Vitest)
        working-directory: src/web
        run: npm test

      - name: Build do front (Next.js + typecheck)
        working-directory: src/web
        run: npm run build

  # SAST em paralelo; raise exige verde.
  codeql:
    name: codeql (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        if: matrix.language == 'csharp'
        with:
          global-json-file: global.json
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Build C# (build-mode manual)
        if: matrix.language == 'csharp'
        run: dotnet build ${{ env.SLN }} -c Release
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # 4) raise: valida os Dockerfiles buildando as DUAS imagens (ate em PR, sem publicar). Em push
  #    (so main/tag, conforme o gatilho on:) tambem roda NuGet audit + SBOM e publica no GHCR
  #    (levante-api + levante-web, <sha> + latest). A stack conjunta (Hiram deploy/stack) consome
  #    as duas pelo mesmo LEVANTE_IMAGE_TAG. Buildar em PR pega quebras de Dockerfile antes do merge.
  raise:
    name: raise (build imagens; publica em merge/tag)
    needs: [polish, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build sempre (valida os Dockerfiles ja em PR). Contextos distintos: a API builda da raiz
      # (precisa dos props de CPM + .editorconfig + BannedSymbols.txt, ver o Dockerfile); o web de src/web.
      - name: Build da imagem da API (non-root, EXPOSE 8080)
        run: >
          docker build -f src/api/host/Levante.Api/Dockerfile
          -t ghcr.io/${{ github.repository_owner }}/levante-api:${{ github.sha }}
          -t ghcr.io/${{ github.repository_owner }}/levante-api:latest
          .

      - name: Build da imagem do web (Next standalone, non-root, EXPOSE 3000)
        run: >
          docker build -f src/web/Dockerfile
          -t ghcr.io/${{ github.repository_owner }}/levante-web:${{ github.sha }}
          -t ghcr.io/${{ github.repository_owner }}/levante-web:latest
          src/web

      # --- Daqui em diante so em push (main/tag); pulado em PR ---
      - uses: actions/setup-dotnet@v5
        if: github.event_name == 'push'
        with:
          global-json-file: global.json

      - name: NuGet audit (CVE falha o build)
        if: github.event_name == 'push'
        run: dotnet restore ${{ env.SLN }}

      # O restore acima ja falha em CVE (NuGetAudit + warnings as errors);
      # este step da visibilidade: lista nominalmente qualquer pacote vulneravel.
      - name: NuGet audit (relatorio nominal)
        if: github.event_name == 'push'
        run: |
          dotnet list ${{ env.SLN }} package --vulnerable --include-transitive | tee audit.txt
          ! grep -q ">" audit.txt

      - name: SBOM (CycloneDX)
        if: github.event_name == 'push'
        run: |
          dotnet tool restore
          dotnet CycloneDX ${{ env.SLN }} -o sbom
      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push'
        with:
          name: sbom
          path: sbom/

      - name: Login no GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push das imagens (levante-api + levante-web)
        if: github.event_name == 'push'
        run: |
          docker push --all-tags ghcr.io/${{ github.repository_owner }}/levante-api
          docker push --all-tags ghcr.io/${{ github.repository_owner }}/levante-web

  # 5) deploy: CD escopado na VM conjunta (so os servicos do Levante), apos raise, em push na
  #    main, com environment protection. Inerte ate a variavel DEPLOY_ENABLED=true, para nao
  #    quebrar o CI da main antes de a VM existir. A logica de deploy vive em
  #    /opt/levante-hiram/deploy-app.sh (repo Hiram, deploy/stack): fixa LEVANTE_IMAGE_TAG=<sha>,
  #    faz pull/up so de levante-api e levante-web (Hiram/Postgres/Caddy intactos). Rollback manual.
  deploy:
    name: deploy (VM conjunta, escopo Levante)
    needs: raise
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy escopado via SSH (pin do tag + recria so os 2 servicos)
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "/opt/levante-hiram/deploy-app.sh levante ${{ github.sha }}"

      - name: Smoke publico (gate; falha => runbook de rollback manual)
        env:
          SMOKE_URL: ${{ vars.SITE_URL }}
        run: |
          set -euo pipefail
          curl -fsS -o /dev/null -w 'health %{http_code}\n' "$SMOKE_URL/api/health"
          curl -fsS -o /dev/null -w 'home   %{http_code}\n' "$SMOKE_URL/"
          # TODO(infra): somar 1 GET dinamico que atravessa web->API (rota publica de reacoes,
          # ReacoesArtigo.tsx) para pegar o cenario "par web/API incompativel"; evidence/run.sh
          # (newsletter fim-a-fim) fica como aceite manual/periodico, nao gate por deploy.
